<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App Space</title>
    
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load SheetJS for Excel Exports -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;
        
        // Inline SVG Icons to prevent external CDN loading errors
        const Icon = ({ children, className = "w-4 h-4" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {children}
          </svg>
        );

        const FileSpreadsheet = ({ className }) => <Icon className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></Icon>;
        const Download = ({ className }) => <Icon className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></Icon>;
        const RefreshCw = ({ className }) => <Icon className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></Icon>;
        const Settings2 = ({ className }) => <Icon className={className}><path d="M4 21v-7"/><path d="M4 10V3"/><path d="M12 21v-9"/><path d="M12 8V3"/><path d="M20 21v-5"/><path d="M20 12V3"/><path d="M1 14h6"/><path d="M9 8h6"/><path d="M17 16h6"/></Icon>;
        const Trash2 = ({ className }) => <Icon className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>;
        const CheckSquare = ({ className }) => <Icon className={className}><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></Icon>;
        const Square = ({ className }) => <Icon className={className}><rect width="18" height="18" x="3" y="3" rx="2"/></Icon>;
        const AlertCircle = ({ className }) => <Icon className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></Icon>;
        const ClipboardCopy = ({ className }) => <Icon className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></Icon>;
        const Check = ({ className }) => <Icon className={className}><polyline points="20 6 9 17 4 12"/></Icon>;
        const ArrowLeft = ({ className }) => <Icon className={className}><line x1="19" x2="5" y1="12" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>;

        function SalesforceTransformer({ onBack }) {
          // Input State
          const [inputText, setInputText] = useState('');
          const [isDataLoaded, setIsDataLoaded] = useState(false);
          const [copySuccess, setCopySuccess] = useState(false);
          
          // Data State
          const [rawData, setRawData] = useState([]);
          const [headers, setHeaders] = useState([]);
          
          // Transformation Settings
          const [selectedColumns, setSelectedColumns] = useState({});
          const [removeEmptyRows, setRemoveEmptyRows] = useState(true);
          const [trimWhitespace, setTrimWhitespace] = useState(true);
          const [transformerMode, setTransformerMode] = useState('forecast');
          const [activeTab, setActiveTab] = useState('preview');
          const [error, setError] = useState('');

          // 1. Parse Pasted Text Data
          const processTextData = (text) => {
            if (!text || !text.trim()) {
              setError('Please paste some data first.');
              return;
            }
            setError('');

            try {
              const lines = text.trim().split(/\r?\n/);
              let delimiter = '\t';
              
              if (!lines[0].includes('\t') && lines[0].includes(',')) {
                delimiter = ',';
              }

              const aoa = lines.map(line => line.split(delimiter));

              if (aoa.length === 0 || (aoa.length === 1 && aoa[0].length <= 1)) {
                setError('Could not detect a valid table format. Ensure you have copied multiple cells.');
                return;
              }

              const extractedHeaders = aoa[0].map((h, i) => h ? h.toString().trim() : `Column ${i + 1}`);
              const rows = aoa.slice(1);

              const formattedData = rows.map(row => {
                const rowData = {};
                extractedHeaders.forEach((header, index) => {
                  rowData[header] = row[index] !== undefined ? row[index] : '';
                });
                return rowData;
              });

              setHeaders(extractedHeaders);
              setRawData(formattedData);
              
              const initialColumnSelection = {};
              extractedHeaders.forEach((h, index) => {
                let keep = true;
                if (transformerMode === 'forecast') {
                  if (index === 2 || index === 4 || h.toLowerCase().includes('next step')) {
                    keep = false;
                  }
                }
                initialColumnSelection[h] = keep;
              });
              setSelectedColumns(initialColumnSelection);
              setIsDataLoaded(true);
            } catch (err) {
              console.error(err);
              setError('Error processing data. Ensure it is copied directly from Excel or Google Sheets.');
            }
          };

          // 2. Transformation Logic
          const transformedData = useMemo(() => {
            if (!rawData.length) return [];

            let processed = rawData
              .map(row => {
                const newRow = {};
                
                headers.forEach(header => {
                  if (selectedColumns[header]) {
                    let value = row[header];
                    if (typeof value === 'string' && trimWhitespace) {
                      value = value.trim();
                    }
                    newRow[header] = value;
                  }
                });

                if (transformerMode === 'forecast') {
                  const amountHeader = headers.find(h => h.toLowerCase().trim() === 'amount') || headers.find(h => h.toLowerCase().includes('amount'));
                  
                  if (amountHeader && newRow[amountHeader] !== undefined && String(newRow[amountHeader]).trim() !== '') {
                    let valStr = String(newRow[amountHeader]).trim();
                    let isNegative = valStr.includes('-') || (valStr.includes('(') && valStr.includes(')'));
                    const cleanNum = valStr.replace(/[^0-9.]+/g, "");
                    const parsedVal = parseFloat(cleanNum);
                    
                    if (!isNaN(parsedVal)) {
                       const roundedUp = Math.ceil(parsedVal);
                       newRow[amountHeader] = (isNegative ? '-' : '') + '$' + Math.abs(roundedUp).toLocaleString('en-US');
                    }
                  }
                }

                return newRow;
              })
              .filter(row => {
                if (removeEmptyRows) {
                  return Object.values(row).some(val => val !== null && val !== '');
                }
                return true;
              });

            if (transformerMode === 'forecast') {
              const catHeader = headers.find(h => h.toLowerCase().trim() === 'forecast category') || headers.find(h => h.toLowerCase().includes('forecast category'));
              const amountHeader = headers.find(h => h.toLowerCase().trim() === 'amount') || headers.find(h => h.toLowerCase().includes('amount'));

              processed.sort((a, b) => {
                const getAmount = (row) => {
                  if (!amountHeader || row[amountHeader] === undefined) return 0;
                  let str = String(row[amountHeader]);
                  let isNeg = str.includes('-') || (str.includes('(') && str.includes(')'));
                  let num = parseFloat(str.replace(/[^0-9.]+/g, "")) || 0;
                  return isNeg ? -num : num;
                };

                const amtA = getAmount(a);
                const amtB = getAmount(b);

                // 1. Sort Alphabetically by Forecast Category FIRST
                if (catHeader) {
                  const catA = String(a[catHeader] || '').toLowerCase();
                  const catB = String(b[catHeader] || '').toLowerCase();
                  if (catA < catB) return -1;
                  if (catA > catB) return 1;
                }

                // 2. Then sort Largest to Smallest by Amount within each category
                if (amtA !== amtB) {
                  return amtB - amtA;
                }

                return 0;
              });
            }

            return processed;
          }, [rawData, headers, selectedColumns, removeEmptyRows, trimWhitespace, transformerMode]);

          // 3. Export & Copy Handlers
          const handleCopy = () => {
            if (!transformedData.length) return;

            const activeHeaders = headers.filter(h => selectedColumns[h]);
            
            const headerRow = activeHeaders.join('\t');
            const dataRows = transformedData.map(row => 
              activeHeaders.map(h => row[h] !== undefined ? row[h] : '').join('\t')
            ).join('\n');
            
            const tsvString = `${headerRow}\n${dataRows}`;

            const textarea = document.createElement('textarea');
            textarea.value = tsvString;
            document.body.appendChild(textarea);
            textarea.select();
            try {
              document.execCommand('copy');
              setCopySuccess(true);
              setTimeout(() => setCopySuccess(false), 2000);
            } catch (err) {
              console.error('Failed to copy', err);
              setError('Failed to copy to clipboard.');
            }
            document.body.removeChild(textarea);
          };

          const handleExport = (format) => {
            if (!window.XLSX || !transformedData.length) return;

            const worksheet = window.XLSX.utils.json_to_sheet(transformedData);
            const workbook = window.XLSX.utils.book_new();
            window.XLSX.utils.book_append_sheet(workbook, worksheet, "Processed Data");

            const newFileName = `processed_data.${format}`;

            if (format === 'csv') {
              window.XLSX.writeFile(workbook, newFileName, { bookType: 'csv' });
            } else {
              window.XLSX.writeFile(workbook, newFileName);
            }
          };

          const resetApp = () => {
            setInputText('');
            setIsDataLoaded(false);
            setRawData([]);
            setHeaders([]);
            setError('');
          };

          const toggleColumn = (header) => {
            setSelectedColumns(prev => ({ ...prev, [header]: !prev[header] }));
          };

          // --- UI Components ---

          if (!isDataLoaded) {
            return (
              <div className="min-h-screen bg-slate-50 p-8 flex flex-col items-center justify-center font-sans relative">
                <div className="absolute top-8 left-8">
                  <button onClick={onBack} className="flex items-center gap-2 px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg transition-colors shadow-sm">
                    <ArrowLeft className="w-4 h-4" /> Back to Space
                  </button>
                </div>
                <div className="max-w-4xl w-full mt-8">
                  <div className="text-center mb-10">
                    <h1 className="text-4xl font-extrabold text-slate-900 mb-4 tracking-tight">Salesforce Forecast List Transformer</h1>
                    <p className="text-lg text-slate-600">Copy your table from Excel and paste it below.</p>
                  </div>

                  {error && (
                    <div className="mb-6 p-4 bg-red-50 border border-red-200 rounded-xl flex items-center text-red-700">
                      <AlertCircle className="w-5 h-5 mr-3 flex-shrink-0" />
                      <p>{error}</p>
                    </div>
                  )}

                  <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col transition-all hover:shadow-md">
                    <textarea
                      className="w-full h-80 p-6 outline-none resize-none font-mono text-sm text-slate-700 placeholder:text-slate-400 focus:bg-indigo-50/10"
                      placeholder="Click here and press Ctrl+V (or Cmd+V) to paste your data..."
                      value={inputText}
                      onChange={(e) => setInputText(e.target.value)}
                      onPaste={(e) => {
                        const text = e.clipboardData.getData('text');
                        if (text) {
                           setTimeout(() => processTextData(text), 10);
                        }
                      }}
                    />
                    <div className="bg-slate-50 p-4 border-t border-slate-200 flex justify-between items-center">
                      <span className="text-sm text-slate-500 font-medium">Auto-detects columns and rows.</span>
                      <button
                        onClick={() => processTextData(inputText)}
                        className="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg transition-colors shadow-sm"
                      >
                        Process Data
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          const activeHeaders = headers.filter(h => selectedColumns[h]);

          return (
            <div className="min-h-screen bg-slate-50 flex flex-col font-sans">
              <header className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shrink-0 sticky top-0 z-10">
                <div className="flex items-center gap-3">
                  <button onClick={onBack} className="p-2 hover:bg-slate-100 rounded-lg transition-colors mr-1 text-slate-500 hover:text-slate-700" title="Back to App Space">
                    <ArrowLeft className="w-5 h-5" />
                  </button>
                  <div className="bg-indigo-600 p-2 rounded-lg">
                    <FileSpreadsheet className="w-5 h-5 text-white" />
                  </div>
                  <div>
                    <h1 className="font-bold text-slate-900 leading-tight">Salesforce Forecast List Transformer</h1>
                    <p className="text-xs text-slate-500 font-medium">Pasted Table</p>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <button 
                    onClick={resetApp}
                    className="flex items-center gap-2 px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors"
                  >
                    <RefreshCw className="w-4 h-4" />
                    Start Over
                  </button>
                  
                  <div className="h-6 w-px bg-slate-200 mx-1"></div>
                  
                  <button 
                    onClick={() => handleExport('csv')}
                    className="flex items-center gap-2 px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg transition-colors shadow-sm"
                  >
                    <Download className="w-4 h-4" />
                    Export CSV
                  </button>

                  <button 
                    onClick={handleCopy}
                    className={`flex items-center gap-2 px-5 py-2 text-sm font-medium text-white rounded-lg transition-colors shadow-sm ${
                      copySuccess ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-indigo-600 hover:bg-indigo-700'
                    }`}
                  >
                    {copySuccess ? <Check className="w-4 h-4" /> : <ClipboardCopy className="w-4 h-4" />}
                    {copySuccess ? 'Copied!' : 'Copy Table'}
                  </button>
                </div>
              </header>

              <div className="flex flex-1 overflow-hidden">
                <aside className="w-80 bg-white border-r border-slate-200 flex flex-col overflow-y-auto shrink-0">
                  <div className="p-6 border-b border-slate-100">
                    <h2 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4 flex items-center gap-2">
                      <Settings2 className="w-4 h-4" />
                      Transformer Mode
                    </h2>
                    <select
                      value={transformerMode}
                      onChange={(e) => setTransformerMode(e.target.value)}
                      className="w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm font-medium rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2.5 outline-none shadow-sm cursor-pointer"
                    >
                      <option value="forecast">Forecast List</option>
                      <option value="general">General (No rules)</option>
                    </select>
                  </div>

                  <div className="p-6 border-b border-slate-100">
                    <h2 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-6 flex items-center gap-2">
                      <Settings2 className="w-4 h-4" />
                      Cleaning Rules
                    </h2>
                    
                    <div className="space-y-4">
                      <label className="flex items-start gap-3 cursor-pointer group">
                        <div className="mt-0.5">
                          <input 
                            type="checkbox" 
                            className="w-4 h-4 text-indigo-600 rounded border-slate-300 focus:ring-indigo-600"
                            checked={removeEmptyRows}
                            onChange={(e) => setRemoveEmptyRows(e.target.checked)}
                          />
                        </div>
                        <div>
                          <span className="block text-sm font-medium text-slate-700 group-hover:text-slate-900">Remove Empty Rows</span>
                          <span className="block text-xs text-slate-500 mt-0.5">Drops rows where all fields are blank.</span>
                        </div>
                      </label>

                      <label className="flex items-start gap-3 cursor-pointer group">
                        <div className="mt-0.5">
                          <input 
                            type="checkbox" 
                            className="w-4 h-4 text-indigo-600 rounded border-slate-300 focus:ring-indigo-600"
                            checked={trimWhitespace}
                            onChange={(e) => setTrimWhitespace(e.target.checked)}
                          />
                        </div>
                        <div>
                          <span className="block text-sm font-medium text-slate-700 group-hover:text-slate-900">Trim Whitespace</span>
                          <span className="block text-xs text-slate-500 mt-0.5">Removes accidental spaces.</span>
                        </div>
                      </label>
                    </div>
                  </div>

                  <div className="p-6">
                     <h2 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4 flex items-center justify-between">
                      <span>Columns mapped ({activeHeaders.length}/{headers.length})</span>
                    </h2>
                    <div className="space-y-2">
                      {headers.map((header, idx) => (
                        <button
                          key={idx}
                          onClick={() => toggleColumn(header)}
                          className={`w-full text-left px-3 py-2 rounded-md text-sm transition-colors flex items-center gap-3 border ${
                            selectedColumns[header] 
                              ? 'bg-indigo-50/50 border-indigo-100 text-indigo-900' 
                              : 'bg-white border-slate-100 text-slate-500 hover:bg-slate-50'
                          }`}
                        >
                          {selectedColumns[header] ? (
                            <CheckSquare className="w-4 h-4 text-indigo-600 flex-shrink-0" />
                          ) : (
                            <Square className="w-4 h-4 text-slate-300 flex-shrink-0" />
                          )}
                          <span className="truncate font-medium">{header || `Column ${idx + 1}`}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                </aside>

                <main className="flex-1 flex flex-col bg-slate-50 overflow-hidden relative">
                  <div className="bg-white border-b border-slate-200 px-6 py-3 flex gap-6 shrink-0">
                    <button 
                      onClick={() => setActiveTab('preview')}
                      className={`text-sm font-semibold pb-3 -mb-3 border-b-2 transition-colors ${
                        activeTab === 'preview' 
                          ? 'border-indigo-600 text-indigo-600' 
                          : 'border-transparent text-slate-500 hover:text-slate-700'
                      }`}
                    >
                      Output Preview ({transformedData.length} rows)
                    </button>
                    <button 
                      onClick={() => setActiveTab('raw')}
                      className={`text-sm font-semibold pb-3 -mb-3 border-b-2 transition-colors ${
                        activeTab === 'raw' 
                          ? 'border-indigo-600 text-indigo-600' 
                          : 'border-transparent text-slate-500 hover:text-slate-700'
                      }`}
                    >
                      Raw Data ({rawData.length} rows)
                    </button>
                  </div>

                  <div className="flex-1 overflow-auto p-6">
                    <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                      <div className="overflow-x-auto">
                        <table className="min-w-full divide-y divide-slate-200">
                          <thead className="bg-slate-50">
                            <tr>
                              <th className="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider w-16 border-r border-slate-200">
                                #
                              </th>
                              {(activeTab === 'preview' ? activeHeaders : headers).map((header, idx) => (
                                <th 
                                  key={idx} 
                                  className="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider whitespace-nowrap"
                                >
                                  {header}
                                </th>
                              ))}
                            </tr>
                          </thead>
                          <tbody className="bg-white divide-y divide-slate-200">
                            {(activeTab === 'preview' ? transformedData : rawData).slice(0, 100).map((row, rowIndex) => (
                              <tr key={rowIndex} className="hover:bg-slate-50 transition-colors">
                                <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-400 border-r border-slate-200 font-mono">
                                  {rowIndex + 1}
                                </td>
                                {(activeTab === 'preview' ? activeHeaders : headers).map((header, colIndex) => (
                                  <td 
                                    key={colIndex} 
                                    className="px-6 py-4 whitespace-nowrap text-sm text-slate-700"
                                  >
                                    {row[header] !== undefined && row[header] !== null ? String(row[header]) : <span className="text-slate-300 italic">null</span>}
                                  </td>
                                ))}
                              </tr>
                            ))}
                          </tbody>
                        </table>
                        
                        {(activeTab === 'preview' ? transformedData : rawData).length === 0 && (
                           <div className="p-12 flex flex-col items-center justify-center text-slate-400">
                             <Trash2 className="w-12 h-12 mb-4 text-slate-300" />
                             <p className="text-lg font-medium">No data to display.</p>
                             <p className="text-sm mt-1">Adjust your cleaning rules or column selection.</p>
                           </div>
                        )}
                      </div>
                    </div>
                    
                    {((activeTab === 'preview' ? transformedData : rawData).length > 100) && (
                      <div className="mt-4 text-center text-sm text-slate-500">
                        Showing first 100 rows.
                      </div>
                    )}
                  </div>
                </main>
              </div>
            </div>
          );
        }

        function App() {
          const [currentApp, setCurrentApp] = useState(null);

          if (currentApp === 'salesforce-forecast') {
            return <SalesforceTransformer onBack={() => setCurrentApp(null)} />;
          }

          return (
            <div className="min-h-screen bg-slate-100 font-sans p-8 md:p-12 flex flex-col items-center">
              <div className="max-w-6xl w-full">
                <header className="mb-12">
                  <h1 className="text-4xl font-extrabold text-slate-900 tracking-tight mb-2">My App Space</h1>
                  <p className="text-lg text-slate-600">Select a tool from your dashboard to get started.</p>
                </header>
                
                <main>
                  <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                    
                    {/* Active App Card */}
                    <button 
                      onClick={() => setCurrentApp('salesforce-forecast')}
                      className="bg-white rounded-2xl p-8 shadow-sm border border-slate-200 hover:shadow-md hover:border-indigo-300 transition-all flex flex-col items-center justify-center aspect-square group text-center hover:-translate-y-1"
                    >
                      <div className="bg-indigo-50 text-indigo-600 p-5 rounded-full mb-6 group-hover:bg-indigo-600 group-hover:text-white transition-colors duration-300 shadow-inner">
                        <FileSpreadsheet className="w-10 h-10" />
                      </div>
                      <h2 className="text-xl font-bold text-slate-800 mb-2 leading-tight group-hover:text-indigo-700 transition-colors">Salesforce Forecast List Transformer</h2>
                      <p className="text-sm text-slate-500 font-medium">Clean & organize sales data</p>
                    </button>

                    {/* Placeholder Card for future apps */}
                    <div className="bg-slate-50 border-2 border-dashed border-slate-300 rounded-2xl p-8 flex flex-col items-center justify-center aspect-square text-center opacity-70">
