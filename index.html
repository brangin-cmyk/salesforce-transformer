<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App Space</title>
    
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load SheetJS for Excel Exports -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;
        
        // --- Inline SVG Icons (Prevents external CDN loading errors) ---
        const Icon = ({ children, className = "w-4 h-4" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {children}
          </svg>
        );

        const FileSpreadsheet = ({ className }) => <Icon className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></Icon>;
        const Download = ({ className }) => <Icon className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></Icon>;
        const RefreshCw = ({ className }) => <Icon className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></Icon>;
        const Settings2 = ({ className }) => <Icon className={className}><path d="M4 21v-7"/><path d="M4 10V3"/><path d="M12 21v-9"/><path d="M12 8V3"/><path d="M20 21v-5"/><path d="M20 12V3"/><path d="M1 14h6"/><path d="M9 8h6"/><path d="M17 16h6"/></Icon>;
        const Settings = ({ className }) => <Icon className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;
        const Trash2 = ({ className }) => <Icon className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>;
        const CheckSquare = ({ className }) => <Icon className={className}><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></Icon>;
        const Square = ({ className }) => <Icon className={className}><rect width="18" height="18" x="3" y="3" rx="2"/></Icon>;
        const AlertCircle = ({ className }) => <Icon className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></Icon>;
        const ClipboardCopy = ({ className }) => <Icon className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></Icon>;
        const Check = ({ className }) => <Icon className={className}><polyline points="20 6 9 17 4 12"/></Icon>;
        const ArrowLeft = ({ className }) => <Icon className={className}><line x1="19" x2="5" y1="12" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>;
        const MapPin = ({ className }) => <Icon className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
        const Navigation = ({ className }) => <Icon className={className}><polygon points="3 11 22 2 13 21 11 13 3 11"/></Icon>;
        const CheckCircle2 = ({ className }) => <Icon className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;
        const ChevronRight = ({ className }) => <Icon className={className}><polyline points="9 18 15 12 9 6"/></Icon>;
        const Info = ({ className }) => <Icon className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Icon>;
        const User = ({ className }) => <Icon className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
        const ArrowDownNarrowWide = ({ className }) => <Icon className={className}><path d="m3 16 4 4 4-4"/><path d="M7 20V4"/><path d="M11 4h4"/><path d="M11 8h7"/><path d="M11 12h10"/></Icon>;
        const Loader2 = ({ className }) => <Icon className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;
        const Table = ({ className }) => <Icon className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="3" x2="21" y1="15" y2="15"/><line x1="9" x2="9" y1="9" y2="21"/><line x1="15" x2="15" y1="9" y2="21"/></Icon>;

        // ==========================================
        // APP 1: SALESFORCE FORECAST TRANSFORMER
        // ==========================================
        function SalesforceTransformer({ onBack }) {
          const [inputText, setInputText] = useState('');
          const [isDataLoaded, setIsDataLoaded] = useState(false);
          const [copySuccess, setCopySuccess] = useState(false);
          
          const [rawData, setRawData] = useState([]);
          const [headers, setHeaders] = useState([]);
          
          const [selectedColumns, setSelectedColumns] = useState({});
          const [removeEmptyRows, setRemoveEmptyRows] = useState(true);
          const [trimWhitespace, setTrimWhitespace] = useState(true);
          const [transformerMode, setTransformerMode] = useState('forecast');
          const [activeTab, setActiveTab] = useState('preview');
          const [error, setError] = useState('');

          const processTextData = (text) => {
            if (!text || !text.trim()) {
              setError('Please paste some data first.');
              return;
            }
            setError('');

            try {
              const lines = text.trim().split(/\r?\n/);
              let delimiter = '\t';
              
              if (!lines[0].includes('\t') && lines[0].includes(',')) {
                delimiter = ',';
              }

              const aoa = lines.map(line => line.split(delimiter));

              if (aoa.length === 0 || (aoa.length === 1 && aoa[0].length <= 1)) {
                setError('Could not detect a valid table format. Ensure you have copied multiple cells.');
                return;
              }

              const extractedHeaders = aoa[0].map((h, i) => h ? h.toString().trim() : `Column ${i + 1}`);
              const rows = aoa.slice(1);

              const formattedData = rows.map(row => {
                const rowData = {};
                extractedHeaders.forEach((header, index) => {
                  rowData[header] = row[index] !== undefined ? row[index] : '';
                });
                return rowData;
              });

              setHeaders(extractedHeaders);
              setRawData(formattedData);
              
              const initialColumnSelection = {};
              extractedHeaders.forEach((h, index) => {
                let keep = true;
                if (transformerMode === 'forecast') {
                  if (index === 2 || index === 4 || h.toLowerCase().includes('next step')) {
                    keep = false;
                  }
                }
                initialColumnSelection[h] = keep;
              });
              setSelectedColumns(initialColumnSelection);
              setIsDataLoaded(true);
            } catch (err) {
              console.error(err);
              setError('Error processing data. Ensure it is copied directly from Excel or Google Sheets.');
            }
          };

          const transformedData = useMemo(() => {
            if (!rawData.length) return [];

            let processed = rawData
              .map(row => {
                const newRow = {};
                
                headers.forEach(header => {
                  if (selectedColumns[header]) {
                    let value = row[header];
                    if (typeof value === 'string' && trimWhitespace) {
                      value = value.trim();
                    }
                    newRow[header] = value;
                  }
                });

                if (transformerMode === 'forecast') {
                  const amountHeader = headers.find(h => h.toLowerCase().trim() === 'amount') || headers.find(h => h.toLowerCase().includes('amount'));
                  
                  if (amountHeader && newRow[amountHeader] !== undefined && String(newRow[amountHeader]).trim() !== '') {
                    let valStr = String(newRow[amountHeader]).trim();
                    let isNegative = valStr.includes('-') || (valStr.includes('(') && valStr.includes(')'));
                    const cleanNum = valStr.replace(/[^0-9.]+/g, "");
                    const parsedVal = parseFloat(cleanNum);
                    
                    if (!isNaN(parsedVal)) {
                       const roundedUp = Math.ceil(parsedVal);
                       newRow[amountHeader] = (isNegative ? '-' : '') + '$' + Math.abs(roundedUp).toLocaleString('en-US');
                    }
                  }
                }

                return newRow;
              })
              .filter(row => {
                if (removeEmptyRows) {
                  return Object.values(row).some(val => val !== null && val !== '');
                }
                return true;
              });

            if (transformerMode === 'forecast') {
              const catHeader = headers.find(h => h.toLowerCase().trim() === 'forecast category') || headers.find(h => h.toLowerCase().includes('forecast category'));
              const amountHeader = headers.find(h => h.toLowerCase().trim() === 'amount') || headers.find(h => h.toLowerCase().includes('amount'));

              processed.sort((a, b) => {
                const getAmount = (row) => {
                  if (!amountHeader || row[amountHeader] === undefined) return 0;
                  let str = String(row[amountHeader]);
                  let isNeg = str.includes('-') || (str.includes('(') && str.includes(')'));
                  let num = parseFloat(str.replace(/[^0-9.]+/g, "")) || 0;
                  return isNeg ? -num : num;
                };

                const amtA = getAmount(a);
                const amtB = getAmount(b);

                if (catHeader) {
                  const catA = String(a[catHeader] || '').toLowerCase();
                  const catB = String(b[catHeader] || '').toLowerCase();
                  if (catA < catB) return -1;
                  if (catA > catB) return 1;
                }

                if (amtA !== amtB) {
                  return amtB - amtA;
                }

                return 0;
              });
            }

            return processed;
          }, [rawData, headers, selectedColumns, removeEmptyRows, trimWhitespace, transformerMode]);

          const handleCopy = () => {
            if (!transformedData.length) return;

            const activeHeaders = headers.filter(h => selectedColumns[h]);
            const headerRow = activeHeaders.join('\t');
            const dataRows = transformedData.map(row => 
              activeHeaders.map(h => row[h] !== undefined ? row[h] : '').join('\t')
            ).join('\n');
            
            const tsvString = `${headerRow}\n${dataRows}`;
            const textarea = document.createElement('textarea');
            textarea.value = tsvString;
            document.body.appendChild(textarea);
            textarea.select();
            try {
              document.execCommand('copy');
              setCopySuccess(true);
              setTimeout(() => setCopySuccess(false), 2000);
            } catch (err) {
              console.error('Failed to copy', err);
              setError('Failed to copy to clipboard.');
            }
            document.body.removeChild(textarea);
          };

          const handleExport = (format) => {
            if (!window.XLSX || !transformedData.length) return;
            const worksheet = window.XLSX.utils.json_to_sheet(transformedData);
            const workbook = window.XLSX.utils.book_new();
            window.XLSX.utils.book_append_sheet(workbook, worksheet, "Processed Data");
            const newFileName = `processed_data.${format}`;
            if (format === 'csv') {
              window.XLSX.writeFile(workbook, newFileName, { bookType: 'csv' });
            } else {
              window.XLSX.writeFile(workbook, newFileName);
            }
          };

          const resetApp = () => {
            setInputText('');
            setIsDataLoaded(false);
            setRawData([]);
            setHeaders([]);
            setError('');
          };

          const toggleColumn = (header) => {
            setSelectedColumns(prev => ({ ...prev, [header]: !prev[header] }));
          };

          if (!isDataLoaded) {
            return (
              <div className="min-h-screen bg-slate-50 p-8 flex flex-col items-center justify-center font-sans relative">
                <div className="absolute top-8 left-8">
                  <button onClick={onBack} className="flex items-center gap-2 px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg transition-colors shadow-sm">
                    <ArrowLeft className="w-4 h-4" /> Back to Space
                  </button>
                </div>
                <div className="max-w-4xl w-full mt-8">
                  <div className="text-center mb-10">
                    <h1 className="text-4xl font-extrabold text-slate-900 mb-4 tracking-tight">Salesforce Forecast List Transformer</h1>
                    <p className="text-lg text-slate-600">Copy your table from Excel and paste it below.</p>
                  </div>
                  {error && (
                    <div className="mb-6 p-4 bg-red-50 border border-red-200 rounded-xl flex items-center text-red-700">
                      <AlertCircle className="w-5 h-5 mr-3 flex-shrink-0" />
                      <p>{error}</p>
                    </div>
                  )}
                  <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col transition-all hover:shadow-md">
                    <textarea
                      className="w-full h-80 p-6 outline-none resize-none font-mono text-sm text-slate-700 placeholder:text-slate-400 focus:bg-indigo-50/10"
                      placeholder="Click here and press Ctrl+V (or Cmd+V) to paste your data..."
                      value={inputText}
                      onChange={(e) => setInputText(e.target.value)}
                      onPaste={(e) => {
                        const text = e.clipboardData.getData('text');
                        if (text) {
                           setTimeout(() => processTextData(text), 10);
                        }
                      }}
                    />
                    <div className="bg-slate-50 p-4 border-t border-slate-200 flex justify-between items-center">
                      <span className="text-sm text-slate-500 font-medium">Auto-detects columns and rows.</span>
                      <button
                        onClick={() => processTextData(inputText)}
                        className="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg transition-colors shadow-sm"
                      >
                        Process Data
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          const activeHeaders = headers.filter(h => selectedColumns[h]);

          return (
            <div className="min-h-screen bg-slate-50 flex flex-col font-sans">
              <header className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shrink-0 sticky top-0 z-10">
                <div className="flex items-center gap-3">
                  <button onClick={onBack} className="p-2 hover:bg-slate-100 rounded-lg transition-colors mr-1 text-slate-500 hover:text-slate-700" title="Back to App Space">
                    <ArrowLeft className="w-5 h-5" />
                  </button>
                  <div className="bg-indigo-600 p-2 rounded-lg">
                    <FileSpreadsheet className="w-5 h-5 text-white" />
                  </div>
                  <div>
                    <h1 className="font-bold text-slate-900 leading-tight">Salesforce Forecast List Transformer</h1>
                    <p className="text-xs text-slate-500 font-medium">Pasted Table</p>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <button 
                    onClick={resetApp}
                    className="flex items-center gap-2 px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors"
                  >
                    <RefreshCw className="w-4 h-4" />
                    Start Over
                  </button>
                  <div className="h-6 w-px bg-slate-200 mx-1"></div>
                  <button 
                    onClick={() => handleExport('csv')}
                    className="flex items-center gap-2 px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg transition-colors shadow-sm"
                  >
                    <Download className="w-4 h-4" />
                    Export CSV
                  </button>
                  <button 
                    onClick={handleCopy}
                    className={`flex items-center gap-2 px-5 py-2 text-sm font-medium text-white rounded-lg transition-colors shadow-sm ${
                      copySuccess ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-indigo-600 hover:bg-indigo-700'
                    }`}
                  >
                    {copySuccess ? <Check className="w-4 h-4" /> : <ClipboardCopy className="w-4 h-4" />}
                    {copySuccess ? 'Copied!' : 'Copy Table'}
                  </button>
                </div>
              </header>

              <div className="flex flex-1 overflow-hidden">
                <aside className="w-80 bg-white border-r border-slate-200 flex flex-col overflow-y-auto shrink-0">
                  <div className="p-6 border-b border-slate-100">
                    <h2 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4 flex items-center gap-2">
                      <Settings2 className="w-4 h-4" />
                      Transformer Mode
                    </h2>
                    <select
                      value={transformerMode}
                      onChange={(e) => setTransformerMode(e.target.value)}
                      className="w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm font-medium rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2.5 outline-none shadow-sm cursor-pointer"
                    >
                      <option value="forecast">Forecast List</option>
                      <option value="general">General (No rules)</option>
                    </select>
                  </div>
                  <div className="p-6 border-b border-slate-100">
                    <h2 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-6 flex items-center gap-2">
                      <Settings2 className="w-4 h-4" />
                      Cleaning Rules
                    </h2>
                    <div className="space-y-4">
                      <label className="flex items-start gap-3 cursor-pointer group">
                        <div className="mt-0.5">
                          <input type="checkbox" className="w-4 h-4 text-indigo-600 rounded border-slate-300" checked={removeEmptyRows} onChange={(e) => setRemoveEmptyRows(e.target.checked)} />
                        </div>
                        <div>
                          <span className="block text-sm font-medium text-slate-700 group-hover:text-slate-900">Remove Empty Rows</span>
                          <span className="block text-xs text-slate-500 mt-0.5">Drops rows where all fields are blank.</span>
                        </div>
                      </label>
                      <label className="flex items-start gap-3 cursor-pointer group">
                        <div className="mt-0.5">
                          <input type="checkbox" className="w-4 h-4 text-indigo-600 rounded border-slate-300" checked={trimWhitespace} onChange={(e) => setTrimWhitespace(e.target.checked)} />
                        </div>
                        <div>
                          <span className="block text-sm font-medium text-slate-700 group-hover:text-slate-900">Trim Whitespace</span>
                          <span className="block text-xs text-slate-500 mt-0.5">Removes accidental spaces.</span>
                        </div>
                      </label>
                    </div>
                  </div>
                  <div className="p-6">
                     <h2 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4 flex items-center justify-between">
                      <span>Columns mapped ({activeHeaders.length}/{headers.length})</span>
                    </h2>
                    <div className="space-y-2">
                      {headers.map((header, idx) => (
                        <button
                          key={idx}
                          onClick={() => toggleColumn(header)}
                          className={`w-full text-left px-3 py-2 rounded-md text-sm transition-colors flex items-center gap-3 border ${
                            selectedColumns[header] ? 'bg-indigo-50/50 border-indigo-100 text-indigo-900' : 'bg-white border-slate-100 text-slate-500 hover:bg-slate-50'
                          }`}
                        >
                          {selectedColumns[header] ? <CheckSquare className="w-4 h-4 text-indigo-600 flex-shrink-0" /> : <Square className="w-4 h-4 text-slate-300 flex-shrink-0" />}
                          <span className="truncate font-medium">{header || `Column ${idx + 1}`}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                </aside>
                <main className="flex-1 flex flex-col bg-slate-50 overflow-hidden relative">
                  <div className="bg-white border-b border-slate-200 px-6 py-3 flex gap-6 shrink-0">
                    <button 
                      onClick={() => setActiveTab('preview')}
                      className={`text-sm font-semibold pb-3 -mb-3 border-b-2 transition-colors ${activeTab === 'preview' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}
                    >
                      Output Preview ({transformedData.length} rows)
                    </button>
                    <button 
                      onClick={() => setActiveTab('raw')}
                      className={`text-sm font-semibold pb-3 -mb-3 border-b-2 transition-colors ${activeTab === 'raw' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}
                    >
                      Raw Data ({rawData.length} rows)
                    </button>
                  </div>
                  <div className="flex-1 overflow-auto p-6">
                    <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                      <div className="overflow-x-auto">
                        <table className="min-w-full divide-y divide-slate-200">
                          <thead className="bg-slate-50">
                            <tr>
                              <th className="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider w-16 border-r border-slate-200">#</th>
                              {(activeTab === 'preview' ? activeHeaders : headers).map((header, idx) => (
                                <th key={idx} className="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider whitespace-nowrap">{header}</th>
                              ))}
                            </tr>
                          </thead>
                          <tbody className="bg-white divide-y divide-slate-200">
                            {(activeTab === 'preview' ? transformedData : rawData).slice(0, 100).map((row, rowIndex) => (
                              <tr key={rowIndex} className="hover:bg-slate-50 transition-colors">
                                <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-400 border-r border-slate-200 font-mono">{rowIndex + 1}</td>
                                {(activeTab === 'preview' ? activeHeaders : headers).map((header, colIndex) => (
                                  <td key={colIndex} className="px-6 py-4 whitespace-nowrap text-sm text-slate-700">
                                    {row[header] !== undefined && row[header] !== null ? String(row[header]) : <span className="text-slate-300 italic">null</span>}
                                  </td>
                                ))}
                              </tr>
                            ))}
                          </tbody>
                        </table>
                        {(activeTab === 'preview' ? transformedData : rawData).length === 0 && (
                           <div className="p-12 flex flex-col items-center justify-center text-slate-400">
                             <Trash2 className="w-12 h-12 mb-4 text-slate-300" />
                             <p className="text-lg font-medium">No data to display.</p>
                             <p className="text-sm mt-1">Adjust your cleaning rules or column selection.</p>
                           </div>
                        )}
                      </div>
                    </div>
                    {((activeTab === 'preview' ? transformedData : rawData).length > 100) && (
                      <div className="mt-4 text-center text-sm text-slate-500">Showing first 100 rows.</div>
                    )}
                  </div>
                </main>
              </div>
            </div>
          );
        }

        // ==========================================
        // APP 2: CUSTOMER DISTANCE CHECKER
        // ==========================================
        const CustomerDistanceChecker = ({ onBack }) => {
          const [xlsxLoaded, setXlsxLoaded] = useState(false);
          const [fileData, setFileData] = useState(null);
          const [columns, setColumns] = useState([]);
          const [selectedZipColumn, setSelectedZipColumn] = useState("");
          const [selectedNameColumn, setSelectedNameColumn] = useState("");
          const [homeZip, setHomeZip] = useState("");
          const [unit, setUnit] = useState("miles");
          const [results, setResults] = useState([]);
          const [status, setStatus] = useState({ type: 'idle', message: '' });
          const [coordsCache, setCoordsCache] = useState({});

          useEffect(() => {
            if (window.XLSX) {
              setXlsxLoaded(true);
              return;
            }
            const script = document.createElement('script');
            script.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
            script.async = true;
            script.onload = () => setXlsxLoaded(true);
            script.onerror = () => setStatus({ type: 'error', message: 'Failed to load Excel library. Check your connection.' });
            document.body.appendChild(script);
          }, []);

          const fetchCoords = async (zip) => {
            const cleanZip = String(zip).trim().padStart(5, '0').substring(0, 5);
            if (coordsCache[cleanZip]) return coordsCache[cleanZip];
            try {
              await new Promise(r => setTimeout(r, 50));
              const response = await fetch(`https://api.zippopotam.us/us/${cleanZip}`);
              if (!response.ok) return null;
              const data = await response.json();
              const place = data.places[0];
              const coords = [parseFloat(place.latitude), parseFloat(place.longitude)];
              setCoordsCache(prev => ({ ...prev, [cleanZip]: coords }));
              return coords;
            } catch (err) {
              return null;
            }
          };

          const calculateDistance = (lat1, lon1, lat2, lon2, unit) => {
            const R = unit === 'miles' ? 3958.8 : 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file || !window.XLSX) return;
            setStatus({ type: 'loading', message: 'Extracting data from file...' });
            const reader = new FileReader();
            reader.onload = (evt) => {
              try {
                const bstr = evt.target.result;
                const XLSX = window.XLSX;
                const wb = XLSX.read(bstr, { type: 'binary' });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const data = XLSX.utils.sheet_to_json(ws);
                if (data.length === 0) throw new Error("This Excel file contains no data.");

                const cols = Object.keys(data[0]);
                setFileData(data);
                setColumns(cols);
                
                const zipCol = cols.find(c => {
                  const l = c.toLowerCase();
                  return l.includes('zip') || l.includes('postal');
                });
                setSelectedZipColumn(zipCol || cols[0]);

                const nameCol = cols.find(c => {
                  const l = c.toLowerCase();
                  return l.includes('account') || l.includes('name') || l.includes('company') || l.includes('client');
                });
                setSelectedNameColumn(nameCol || (cols[1] || cols[0]));

                setStatus({ type: 'success', message: `Found ${data.length} records. Verify your mappings and enter a Source ZIP.` });
              } catch (err) {
                setStatus({ type: 'error', message: err.message });
              }
            };
            reader.readAsBinaryString(file);
          };

          const processDistances = async () => {
            if (!homeZip || homeZip.length < 5) {
              setStatus({ type: 'error', message: 'Please enter a valid 5-digit Source ZIP.' });
              return;
            }
            setStatus({ type: 'loading', message: 'Connecting to coordinate engine...' });
            
            try {
              const homeCoords = await fetchCoords(homeZip);
              if (!homeCoords) {
                setStatus({ type: 'error', message: `Invalid Source ZIP: ${homeZip}. Could not find coordinates.` });
                return;
              }

              const [hLat, hLon] = homeCoords;
              const distKey = `Distance_from_${homeZip}_(${unit})`;
              const processedRows = [];
              const total = fileData.length;

              for (let i = 0; i < total; i++) {
                const row = fileData[i];
                if (i % 2 === 0) {
                  setStatus({ type: 'loading', message: `Calculating distances: ${i + 1} / ${total}` });
                }

                const rawZip = String(row[selectedZipColumn]);
                const targetCoords = await fetchCoords(rawZip);

                if (targetCoords) {
                  const distance = calculateDistance(hLat, hLon, targetCoords[0], targetCoords[1], unit);
                  processedRows.push({ ...row, [distKey]: parseFloat(distance.toFixed(2)), _sortDist: distance });
                } else {
                  processedRows.push({ ...row, [distKey]: 'N/A', _sortDist: Infinity, _invalid: true });
                }
              }

              processedRows.sort((a, b) => a._sortDist - b._sortDist);
              setResults(processedRows);
              setStatus({ type: 'success', message: 'Analysis complete! Results are sorted by proximity.' });
            } catch (err) {
              setStatus({ type: 'error', message: 'An unexpected error occurred during processing.' });
            }
          };

          const downloadResults = () => {
            const XLSX = window.XLSX;
            const exportData = results.map(({ _sortDist, _invalid, ...rest }) => rest);
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Distance Analysis");
            XLSX.writeFile(wb, `Proximity_Sort_${homeZip}.xlsx`);
          };

          const resetApp = () => {
            setFileData(null);
            setResults([]);
            setHomeZip("");
            setStatus({ type: 'idle', message: '' });
          };

          if (!xlsxLoaded && status.type !== 'error') {
            return (
              <div className="flex items-center justify-center min-h-screen bg-slate-50">
                <div className="flex flex-col items-center gap-4">
                  <Loader2 className="w-12 h-12 text-indigo-600 animate-spin" />
                  <p className="text-slate-500 font-medium">Booting Mapping Services...</p>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-slate-50 text-slate-900 font-sans p-4 md:p-8">
              <div className="max-w-5xl mx-auto">
                <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                  <div className="flex items-center gap-3">
                    <button onClick={onBack} className="p-2 hover:bg-slate-200 rounded-lg transition-colors mr-1 text-slate-500 hover:text-slate-700" title="Back to App Space">
                      <ArrowLeft className="w-5 h-5" />
                    </button>
                    <div className="bg-indigo-600 p-2.5 rounded-2xl shadow-lg shadow-indigo-100">
                      <Navigation className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-2xl font-black text-slate-800 tracking-tight">ZipDistance Pro</h1>
                      <p className="text-sm text-slate-500 font-medium">Smart Proximity Engine</p>
                    </div>
                  </div>
                  {results.length > 0 && (
                    <button onClick={resetApp} className="px-4 py-2 bg-white border border-slate-200 rounded-xl text-sm font-bold text-red-500 hover:bg-red-50 hover:border-red-100 transition-all flex items-center gap-2">
                      <Trash2 className="w-4 h-4" /> Start New Search
                    </button>
                  )}
                </header>

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                  <div className="lg:col-span-4 space-y-6">
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                      <h2 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                        <Settings className="w-4 h-4" /> App Settings
                      </h2>
                      <div className="space-y-6">
                        <div>
                          <label className="block text-sm font-bold text-slate-700 mb-2">1. Source ZIP Code</label>
                          <div className="relative">
                            <MapPin className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" />
                            <input 
                              type="text" 
                              placeholder="e.g. 90210"
                              className="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-semibold"
                              value={homeZip}
                              onChange={(e) => setHomeZip(e.target.value.replace(/\D/g, '').slice(0, 5))}
                            />
                          </div>
                        </div>

                        {fileData && (
                          <div className="space-y-4 pt-4 border-t border-slate-100">
                            <div>
                              <label className="block text-sm font-bold text-slate-700 mb-2 flex items-center gap-2">
                                <User className="w-4 h-4 text-slate-400" /> Account Column
                              </label>
                              <select 
                                className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium appearance-none"
                                value={selectedNameColumn}
                                onChange={(e) => setSelectedNameColumn(e.target.value)}
                              >
                                {columns.map(c => <option key={c} value={c}>{c}</option>)}
                              </select>
                            </div>
                            <div>
                              <label className="block text-sm font-bold text-slate-700 mb-2 flex items-center gap-2">
                                <MapPin className="w-4 h-4 text-slate-400" /> ZIP Column
                              </label>
                              <select 
                                className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium appearance-none"
                                value={selectedZipColumn}
                                onChange={(e) => setSelectedZipColumn(e.target.value)}
                              >
                                {columns.map(c => <option key={c} value={c}>{c}</option>)}
                              </select>
                            </div>
                          </div>
                        )}

                        <div>
                          <label className="block text-sm font-bold text-slate-700 mb-2">Distance Unit</label>
                          <div className="flex p-1 bg-slate-100 rounded-2xl">
                            {['miles', 'km'].map(u => (
                              <button 
                                key={u}
                                onClick={() => setUnit(u)}
                                className={`flex-1 py-2 text-sm font-bold rounded-xl transition-all ${unit === u ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                              >
                                {u === 'miles' ? 'Miles' : 'KM'}
                              </button>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="bg-indigo-600 p-6 rounded-3xl text-white shadow-xl shadow-indigo-200">
                      <div className="flex gap-4">
                        <div className="p-2 bg-indigo-500/50 rounded-xl h-fit">
                          <Info className="w-5 h-5" />
                        </div>
                        <div>
                          <h4 className="font-bold mb-1 italic">Pro Accuracy Mode</h4>
                          <p className="text-xs text-indigo-100 leading-relaxed">
                            This app validates every ZIP code against live coordinate databases. Distances are calculated using the Haversine formula for exact geospatial results.
                          </p>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="lg:col-span-8 space-y-6">
                    {!fileData && (
                      <label className="block cursor-pointer">
                        <div className="border-4 border-dashed border-slate-200 rounded-[40px] p-20 bg-white hover:border-indigo-400 hover:bg-indigo-50/20 transition-all text-center group">
                          <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
                            <FileSpreadsheet className="w-10 h-10" />
                          </div>
                          <h3 className="text-2xl font-black text-slate-800 mb-2">Drop your Data File</h3>
                          <p className="text-slate-500 font-medium max-w-sm mx-auto">Upload an Excel (.xlsx) or CSV containing your account names and zip codes to begin.</p>
                          <input type="file" className="hidden" accept=".xlsx, .xls, .csv" onChange={handleFileUpload} />
                        </div>
                      </label>
                    )}

                    {status.type !== 'idle' && (
                      <div className={`p-5 rounded-3xl flex items-center gap-4 border animate-in fade-in slide-in-from-top-4 duration-300 ${
                        status.type === 'loading' ? 'bg-blue-50 text-blue-700 border-blue-100' :
                        status.type === 'success' ? 'bg-emerald-50 text-emerald-700 border-emerald-100' :
                        'bg-red-50 text-red-700 border-red-100'
                      }`}>
                        {status.type === 'loading' ? (
                          <Loader2 className="w-6 h-6 animate-spin" />
                        ) : status.type === 'success' ? (
                          <CheckCircle2 className="w-6 h-6" />
                        ) : (
                          <AlertCircle className="w-6 h-6" />
                        )}
                        <span className="font-bold text-sm tracking-tight">{status.message}</span>
                      </div>
                    )}

                    {fileData && results.length === 0 && (
                      <div className="bg-white p-10 rounded-[40px] shadow-sm border border-slate-200 text-center">
                        <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                          <Table className="w-8 h-8" />
                        </div>
                        <h3 className="text-2xl font-black mb-2">File Loaded Successfully</h3>
                        <p className="text-slate-500 font-medium mb-10">
                          Ready to process <strong>{fileData.length}</strong> accounts.
                        </p>
                        <button 
                          onClick={processDistances}
                          disabled={!homeZip || status.type === 'loading'}
                          className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-slate-800 disabled:opacity-30 disabled:cursor-not-allowed shadow-2xl shadow-slate-200 transition-all flex items-center justify-center gap-3"
                        >
                          RUN PROXIMITY SORT
                          <ChevronRight className="w-6 h-6" />
                        </button>
                      </div>
                    )}

                    {results.length > 0 && (
                      <div className="bg-white p-8 rounded-[40px] shadow-sm border border-slate-200 space-y-8 animate-in zoom-in-95 duration-500">
                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-6">
                          <div className="flex items-center gap-4">
                            <div className="p-3 bg-indigo-50 rounded-2xl">
                              <ArrowDownNarrowWide className="w-6 h-6 text-indigo-600" />
                            </div>
                            <div>
                              <h3 className="text-xl font-black text-slate-800 leading-none">Proximity Results</h3>
                              <p className="text-sm text-slate-400 font-bold mt-1 uppercase tracking-widest">Ordered: Closest First</p>
                            </div>
                          </div>
                          <button 
                            onClick={downloadResults} 
                            className="bg-emerald-600 text-white px-6 py-4 rounded-2xl font-black hover:bg-emerald-700 flex items-center justify-center gap-2 text-sm shadow-xl shadow-emerald-100 transition-all"
                          >
                            <Download className="w-5 h-5" /> EXPORT FULL TABLE
                          </button>
                        </div>

                        <div className="overflow-hidden border border-slate-100 rounded-3xl">
                          <table className="w-full text-left">
                            <thead className="bg-slate-50/50">
                              <tr>
                                <th className="px-6 py-5 text-xs font-black text-slate-400 uppercase tracking-widest border-b">Account Name</th>
                                <th className="px-6 py-5 text-xs font-black text-slate-400 uppercase tracking-widest border-b">Zip</th>
                                <th className="px-6 py-5 text-xs font-black text-indigo-700 uppercase tracking-widest border-b text-right">Distance</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-50">
                              {results.slice(0, 50).map((r, i) => (
                                <tr key={i} className={`hover:bg-slate-50/50 transition-colors ${r._invalid ? 'opacity-50 grayscale' : ''}`}>
                                  <td className="px-6 py-5 font-bold text-slate-700">
                                    {r[selectedNameColumn] || 'Unknown'}
                                  </td>
                                  <td className="px-6 py-5 text-slate-400 font-mono font-medium">
                                    {r[selectedZipColumn]}
                                  </td>
                                  <td className="px-6 py-5 text-right">
                                    {r._invalid ? (
                                      <span className="text-[10px] font-black bg-slate-100 text-slate-400 px-2 py-1 rounded-lg uppercase">Error</span>
                                    ) : (
                                      <span className="font-black text-indigo-600 bg-indigo-50 px-4 py-1.5 rounded-xl text-xs whitespace-nowrap">
                                        {r[`Distance_from_${homeZip}_(${unit})`].toLocaleString()} {unit === 'miles' ? 'mi' : 'km'}
                                      </span>
                                    )}
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                          {results.length > 50 && (
                            <div className="p-6 text-center text-xs font-black text-slate-300 bg-slate-50/30 border-t border-slate-100 tracking-widest uppercase">
                              + {results.length - 50} more records in the exported file
                            </div>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // ==========================================
        // MAIN DASHBOARD (APP SPACE)
        // ==========================================
        function App() {
          const [currentApp, setCurrentApp] = useState(null);

          if (currentApp === 'salesforce-forecast') {
            return <SalesforceTransformer onBack={() => setCurrentApp(null)} />;
          }

          if (currentApp === 'customer-distance') {
            return <CustomerDistanceChecker onBack={() => setCurrentApp(null)} />;
          }

          return (
            <div className="min-h-screen bg-slate-100 font-sans p-8 md:p-12 flex flex-col items-center">
              <div className="max-w-6xl w-full">
                <header className="mb-12">
                  <h1 className="text-4xl font-extrabold text-slate-900 tracking-tight mb-2">My App Space</h1>
                  <p className="text-lg text-slate-600">Select a tool from your dashboard to get started.</p>
                </header>
                
                <main>
                  <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                    
                    {/* Tool 1: Salesforce Forecast List Transformer */}
                    <button 
                      onClick={() => setCurrentApp('salesforce-forecast')}
                      className="bg-white rounded-2xl p-8 shadow-sm border border-slate-200 hover:shadow-md hover:border-indigo-300 transition-all flex flex-col items-center justify-center aspect-square group text-center hover:-translate-y-1"
                    >
                      <div className="bg-indigo-50 text-indigo-600 p-5 rounded-full mb-6 group-hover:bg-indigo-600 group-hover:text-white transition-colors duration-300 shadow-inner">
                        <FileSpreadsheet className="w-10 h-10" />
                      </div>
                      <h2 className="text-xl font-bold text-slate-800 mb-2 leading-tight group-hover:text-indigo-700 transition-colors">Salesforce Forecast List Transformer</h2>
                      <p className="text-sm text-slate-500 font-medium">Clean & organize sales data</p>
                    </button>

                    {/* Tool 2: Customer Distance Checker */}
                    <button 
                      onClick={() => setCurrentApp('customer-distance')}
                      className="bg-white rounded-2xl p-8 shadow-sm border border-slate-200 hover:shadow-md hover:border-emerald-300 transition-all flex flex-col items-center justify-center aspect-square group text-center hover:-translate-y-1"
                    >
                      <div className="bg-emerald-50 text-emerald-600 p-5 rounded-full mb-6 group-hover:bg-emerald-600 group-hover:text-white transition-colors duration-300 shadow-inner">
                        <MapPin className="w-10 h-10" />
                      </div>
                      <h2 className="text-xl font-bold text-slate-800 mb-2 leading-tight group-hover:text-emerald-700 transition-colors">Customer Distance Checker</h2>
                      <p className="text-sm text-slate-500 font-medium">Find closest accounts by ZIP</p>
                    </button>

                    {/* Placeholder Card for future apps */}
                    <div className="bg-slate-50 border-2 border-dashed border-slate-300 rounded-2xl p-8 flex flex-col items-center justify-center aspect-square text-center opacity-70">
                       <div className="bg-slate-200 text-slate-400 p-5 rounded-full mb-6">
                         <svg className="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                           <path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" />
                         </svg>
                       </div>
                       <h2 className="text-lg font-bold text-slate-500 mb-1">Add New Tool</h2>
                       <p className="text-sm text-slate-400">Coming soon...</p>
                    </div>

                  </div>
                </main>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
